<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Trays - BSF Monitoring</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            color: #2c3e50;
            font-size: 2rem;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #ecf0f1;
            color: #2c3e50;
        }

        .btn-secondary:hover {
            background: #bdc3c7;
        }

        .chart-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .chart-wrapper {
            position: relative;
            height: 400px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #7f8c8d;
            font-size: 1.2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .stat-label {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .stat-value {
            color: #2c3e50;
            font-size: 2rem;
            font-weight: 700;
        }

        .stat-unit {
            font-size: 1rem;
            color: #95a5a6;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔬 Compare All Trays</h1>
            <div>
                <a href="/dashboard" class="btn btn-secondary">← Back to Dashboard</a>
                <a href="/logout" class="btn btn-primary">Logout</a>
            </div>
        </header>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-label">Total Trays</div>
                <div class="stat-value" id="totalTrays">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Average Weight</div>
                <div class="stat-value"><span id="avgWeight">0</span> <span class="stat-unit">mg</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Larvae</div>
                <div class="stat-value" id="totalLarvae">0</div>
            </div>
        </div>

        <div class="chart-container">
            <h2 style="margin-bottom: 20px; color: #2c3e50;">Average Weight by Tray (Latest Upload)</h2>
            <div class="chart-wrapper">
                <canvas id="scatterChart"></canvas>
            </div>
        </div>

        <div class="loading" id="loading">Loading comparison data...</div>
    </div>

    <script>
        let scatterChart = null;

        async function loadComparisonData() {
            try {
                const response = await fetch('/api/compare_trays');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (!data.trays || data.trays.length === 0) {
                    document.getElementById('loading').textContent = 'No tray data available';
                    return;
                }
                
                // Hide loading
                document.getElementById('loading').style.display = 'none';
                
                // Update stats
                const totalTrays = data.trays.length;
                const totalLarvae = data.trays.reduce((sum, t) => sum + t.count, 0);
                const avgWeight = data.trays.reduce((sum, t) => sum + t.avg_weight, 0) / totalTrays;
                
                document.getElementById('totalTrays').textContent = totalTrays;
                document.getElementById('avgWeight').textContent = avgWeight.toFixed(3);
                document.getElementById('totalLarvae').textContent = totalLarvae;
                
                // Prepare scatter plot data with categorical x-axis
                const trayLabels = data.trays.map(tray => `Tray ${tray.tray_number}`);
                const scatterData = data.trays.map((tray, index) => ({
                    x: index,  // Use index for categorical positioning
                    y: tray.avg_weight,
                    trayNumber: tray.tray_number,
                    count: tray.count,
                    timestamp: new Date(tray.timestamp).toLocaleString()
                }));
                
                // Generate dynamic colors
                const colors = scatterData.map((_, index) => {
                    const hue = (index * 360 / scatterData.length) % 360;
                    return `hsl(${hue}, 70%, 50%)`;
                });
                
                // Create scatter plot
                const ctx = document.getElementById('scatterChart').getContext('2d');
                scatterChart = new Chart(ctx, {
                    type: 'scatter',
                    data: {
                        labels: trayLabels,
                        datasets: [{
                            label: 'Average Weight per Tray',
                            data: scatterData,
                            backgroundColor: colors,
                            borderColor: colors,
                            borderWidth: 2,
                            pointRadius: 8,
                            pointHoverRadius: 12
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const point = context.raw;
                                        return [
                                            `Tray #${point.trayNumber}`,
                                            `Weight: ${point.y.toFixed(3)} mg`,
                                            `Larvae: ${point.count}`,
                                            `Updated: ${point.timestamp}`
                                        ];
                                    }
                                }
                            },
                            legend: {
                                display: false
                            }
                        },
                        scales: {
                            x: {
                                type: 'category',
                                labels: trayLabels,
                                title: {
                                    display: true,
                                    text: 'Tray Number',
                                    font: {
                                        size: 14,
                                        weight: 'bold'
                                    }
                                }
                            },
                            y: {
                                title: {
                                    display: true,
                                    text: 'Average Weight (mg)',
                                    font: {
                                        size: 14,
                                        weight: 'bold'
                                    }
                                },
                                beginAtZero: true
                            }
                        }
                    }
                });
                
            } catch (error) {
                console.error('Error loading comparison data:', error);
                document.getElementById('loading').textContent = 'Error loading data';
            }
        }

        // Load data on page load
        loadComparisonData();
    </script>
</body>
</html>
